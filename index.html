<!DOCTYPE html>
<html>
<head>
  <title>Netflix Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Netflix+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <img src="https://static.wikia.nocookie.net/theloudhouse/images/e/ef/Netflix_icon.svg.png/revision/latest/scale-to-width-down/1000?cb=20240410214645" class="logo">
    <h1>Entrar</h1>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Endereço de email ou número de telefone" required>
      <input type="password" id="password" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>
    <p>Novos por aqui? <a href="#">Junte-se a nós agora</a>.</p>
    <p class="help"><a href="#">Problemas para entrar?</a></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
